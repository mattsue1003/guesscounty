<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猜猜我是誰 - 提示搶答遊戲</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 自訂樣式 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            /* 防止 iOS 橡皮筋回彈效果 */
            overscroll-behavior: none; 
        }

        /* ========== 核心版面控制：保證不捲動 & 電腦版 16:9 ========== */
        .app-wrapper {
            width: 100vw;
            height: 100dvh;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            .app-wrapper {
                width: 100vw;
                height: 56.25vw; /* 16:9 Aspect Ratio */
                max-height: 100dvh;
                max-width: 177.78dvh;
                margin: auto;
                border-radius: 1.5rem;
                border: 6px solid #1e293b;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }

        /* ========== 立體按鈕樣式 ========== */
        .btn-3d {
            transition: all 0.1s;
            border-bottom-width: 6px;
        }
        .btn-3d:active:not(:disabled) {
            border-bottom-width: 0px;
            transform: translateY(6px);
        }
        .btn-3d:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        /* 隱藏預設捲軸 (針對首頁) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<!-- 電腦版深色背景，凸顯中間的遊戲視窗 -->
<body class="bg-slate-900 flex items-center justify-center h-[100dvh] w-screen overflow-hidden select-none text-slate-900">

    <!-- 唯一的應用程式容器 -->
    <div class="app-wrapper">
        
        <!-- ==================== 開始畫面 ==================== -->

                    <i data-lucide="map" class="w-10 h-10 sm:w-16 sm:h-16 text-indigo-600"></i>
                    <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-slate-900 tracking-wider">猜猜我是誰</h1>
                </div>
                <p class="text-slate-600 text-lg sm:text-2xl font-bold bg-slate-200 px-5 py-2 rounded-full border-2 border-slate-300">請選擇挑戰的縣市</p>

            <!-- 縣市按鈕網格 (手機板 2 欄位，適應內容) -->

                    </button>
                    <button onclick="startGame('new_taipei')" class="flex flex-col items-center justify-center py-4 sm:py-0 bg-white border-4 border-slate-300 rounded-2xl hover:bg-indigo-50 hover:border-indigo-500 btn-3d active:border-indigo-500">

                        <i data-lucide="plane" class="w-10 h-10 sm:w-14 sm:h-14 text-sky-600 mb-2 sm:mb-4"></i>

                    </button>
                    <button onclick="startGame('taichung')" class="flex flex-col items-center justify-center py-4 sm:py-0 bg-white border-4 border-slate-300 rounded-2xl hover:bg-orange-50 hover:border-orange-500 btn-3d active:border-orange-500">
                        <i data-lucide="sun" class="w-10 h-10 sm:w-14 sm:h-14 text-orange-600 mb-2 sm:mb-4"></i>
                        <h3 class="text-2xl sm:text-4xl font-black text-slate-800">台中</h3>
                    </button>
                    <button onclick="startGame('tainan')" class="flex flex-col items-center justify-center py-4 sm:py-0 bg-white border-4 border-slate-300 rounded-2xl hover:bg-red-50 hover:border-red-500 btn-3d active:border-red-500">
                        <i data-lucide="utensils" class="w-10 h-10 sm:w-14 sm:h-14 text-red-600 mb-2 sm:mb-4"></i>

                    </button>
                    <button onclick="startGame('pingtung')" class="flex flex-col items-center justify-center py-4 sm:py-0 bg-white border-4 border-slate-300 rounded-2xl hover:bg-yellow-50 hover:border-yellow-500 btn-3d active:border-yellow-500">

        <!-- ==================== 遊戲畫面 ==================== -->
        <div id="game-screen" class="hidden flex-col h-full w-full bg-slate-100 relative">
            
            <!-- 頂部導覽列 -->
            <header class="h-14 sm:h-20 bg-slate-800 text-white flex items-center justify-between px-3 sm:px-6 shrink-0 z-20 shadow-md">

                    </button>
                    <div class="hidden sm:flex items-center gap-3 ml-2">
                        <span id="mode-badge" class="px-4 py-1 rounded-full font-black text-lg border-2 bg-slate-100 text-slate-900 border-slate-400">主題</span>
                    </div>
                </div>
                
                <!-- 修改點：讓標題在手機板縮小並避免被擠壓 -->
                <h2 class="text-lg sm:text-3xl md:text-4xl font-black tracking-widest absolute left-1/2 -translate-x-1/2 w-max">猜猜我是誰</h2>
                
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="bg-slate-900 px-3 sm:px-5 py-1 sm:py-2 rounded-full border-2 border-slate-600 font-bold text-sm sm:text-xl">
                        <span id="progress-text">1/20</span>
                    </div>
                    <button onclick="toggleMute()" id="btn-mute" class="p-2 sm:p-3 bg-slate-700 hover:bg-slate-600 rounded-lg sm:rounded-xl transition-colors border-2 border-slate-600">

                    </button>
                </div>
            </header>

            <!-- 畫面主體 -->
            <main class="flex-1 flex flex-col min-h-0 p-2 sm:p-6 pb-0 max-w-6xl mx-auto w-full">

                <div class="flex justify-between items-end mb-2 sm:mb-4 shrink-0 px-1 sm:px-2">
                    <h2 id="question-title" class="text-3xl sm:text-5xl font-black text-slate-900 border-b-4 border-slate-400 pb-1">第 1 題</h2>
                    <div class="text-base sm:text-2xl font-bold text-slate-700 bg-white px-3 sm:px-4 py-1 sm:py-2 rounded-xl border-2 sm:border-4 border-slate-300 shadow-sm flex items-center gap-1 sm:gap-2">

                        <span class="sm:hidden">提示:</span>
                        <span id="revealed-count" class="text-indigo-600 text-2xl sm:text-4xl font-black">0</span>
                        <span>/ 6</span>
                    </div>
                </div>

                <!-- 九宮格提示區 -->

                    <div id="clues-grid" class="absolute inset-0 grid grid-cols-2 sm:grid-cols-3 grid-rows-3 sm:grid-rows-2 gap-2 sm:gap-5">
                        <!-- 動態插入 -->
                    </div>

                    <!-- 答案揭曉 -->
                    <div id="answer-container" class="absolute inset-0 bg-white border-[6px] sm:border-[12px] border-emerald-500 rounded-[1.5rem] sm:rounded-[2rem] flex flex-col items-center justify-center z-10 opacity-0 pointer-events-none transition-all duration-300 shadow-2xl scale-95 px-2">
                        <div class="bg-emerald-100 text-emerald-800 font-black text-xl sm:text-3xl px-6 sm:px-8 py-2 rounded-full mb-4 sm:mb-8 border-2 sm:border-4 border-emerald-300">🎉 正確答案 🎉</div>
                        <!-- 修改點：確保超長文字在手機板可以自動縮小或換行 -->
                        <div id="answer-text" class="text-4xl sm:text-[6rem] md:text-[8rem] font-black text-slate-900 tracking-wider text-center leading-tight drop-shadow-md break-words max-w-full"></div>
                        
                        <button id="search-image-btn" onclick="openImageSlider()" class="mt-6 sm:mt-12 bg-sky-500 hover:bg-sky-400 text-white font-black py-2 px-4 sm:py-4 sm:px-8 rounded-xl sm:rounded-2xl text-base sm:text-3xl shadow-lg transition-all flex items-center gap-2 sm:gap-3 btn-3d border-sky-700">
                            <i data-lucide="images" class="w-5 h-5 sm:w-8 sm:h-8"></i>

                        </button>
                    </div>
                </div>
                
            </main>

            <!-- 底部控制列 -->
            <!-- 修改點：手機板自動轉為垂直排列 (圖在上、字在下)，避免文字被截斷 -->

                <button id="btn-prev" onclick="changeQuestion(-1)" class="btn-3d flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 bg-slate-200 text-slate-800 border-slate-400 rounded-lg sm:rounded-2xl font-bold sm:font-black text-sm sm:text-2xl py-2 sm:py-4">
                    <i data-lucide="chevron-left" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                    <span class="leading-none">上一題</span>
                </button>
                <button id="btn-next" onclick="changeQuestion(1)" class="btn-3d flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 bg-slate-200 text-slate-800 border-slate-400 rounded-lg sm:rounded-2xl font-bold sm:font-black text-sm sm:text-2xl py-2 sm:py-4">
                    <span class="hidden sm:inline">下一題</span>
                    <i data-lucide="chevron-right" class="w-6 h-6 sm:w-10 sm:h-10 sm:hidden"></i>
                    <span class="sm:hidden leading-none">下一題</span>
                    <i data-lucide="chevron-right" class="w-6 h-6 sm:w-10 sm:h-10 hidden sm:inline"></i>
                </button>
                <button id="btn-open-clue" onclick="nextClue()" class="btn-3d flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 bg-indigo-600 text-white border-indigo-900 rounded-lg sm:rounded-2xl font-bold sm:font-black text-sm sm:text-3xl py-2 sm:py-4">
                    <i data-lucide="search" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                    <span class="leading-none">開提示</span>
                </button>
                <button id="btn-show-ans" onclick="showAnswer()" class="btn-3d flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 bg-rose-600 text-white border-rose-900 rounded-lg sm:rounded-2xl font-bold sm:font-black text-sm sm:text-3xl py-2 sm:py-4">
                    <i data-lucide="eye" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                    <span class="leading-none">看答案</span>
                </button>
            </div>
        </div>

        <!-- ==================== 提示放大視窗 (Modal) ==================== -->
        <div id="clue-modal" class="hidden fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex-col items-center justify-center p-4 sm:p-6 cursor-pointer" onclick="closeClueModal()">

                    <i data-lucide="mouse-pointer-click" class="w-5 h-5 sm:w-6 sm:h-6"></i> 輕觸畫面關閉
                </div>
            </div>
        </div>

        <!-- ==================== 圖片輪播視窗 (Modal) ==================== -->
        <div id="image-slider-modal" class="hidden fixed inset-0 z-50 bg-slate-900/95 backdrop-blur-md flex-col items-center justify-center p-2 sm:p-6">
            <div class="absolute top-4 right-4 sm:top-8 sm:right-8 z-50">
                <button onclick="closeImageSlider()" class="bg-white/20 hover:bg-white/40 text-white p-2 sm:p-3 rounded-full backdrop-blur-sm transition-colors cursor-pointer">
                    <i data-lucide="x" class="w-6 h-6 sm:w-8 sm:h-8"></i>
                </button>
            </div>
            
            <h3 id="image-slider-title" class="absolute top-5 left-4 sm:top-8 sm:left-8 text-white font-black text-xl sm:text-4xl drop-shadow-lg z-50"></h3>

            <div id="image-slider-content" class="relative w-full max-w-5xl h-[70vh] flex items-center justify-center select-none touch-pan-y mt-12 sm:mt-0 px-2">
                <div id="image-loading" class="hidden flex-col items-center justify-center text-white">
                    <i data-lucide="loader-2" class="w-12 h-12 sm:w-16 sm:h-16 animate-spin mb-4"></i>
                    <span class="text-xl sm:text-2xl font-bold tracking-widest">尋找相片中...</span>
                </div>
                
                <img id="slider-image" src="" alt="相關圖片" class="hidden max-w-full max-h-full object-contain rounded-xl sm:rounded-2xl shadow-2xl pointer-events-none" />
                
                <div id="image-error" class="hidden flex-col items-center justify-center text-slate-400 text-center px-4">
                    <i data-lucide="image-off" class="w-16 h-16 sm:w-20 sm:h-20 mb-4 opacity-50"></i>
                    <span class="text-xl sm:text-2xl font-bold">目前找不到這題的相片哦！</span>
                </div>

                <button id="slider-prev-btn" onclick="prevImage(event)" class="absolute left-0 sm:-left-12 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/80 text-white p-3 sm:p-4 rounded-full backdrop-blur-sm transition-colors z-10 hidden cursor-pointer">
                    <i data-lucide="chevron-left" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                </button>
                <button id="slider-next-btn" onclick="nextImage(event)" class="absolute right-0 sm:-right-12 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black/80 text-white p-3 sm:p-4 rounded-full backdrop-blur-sm transition-colors z-10 hidden cursor-pointer">
                    <i data-lucide="chevron-right" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                </button>
            </div>

            <div class="absolute bottom-6 sm:bottom-8 left-1/2 -translate-x-1/2 bg-black/60 px-5 py-2 rounded-full backdrop-blur-sm">
                <span id="slider-counter" class="text-white font-bold text-lg sm:text-xl tracking-widest">1 / 1</span>
            </div>
        </div>

    </div>

        // --- 音效系統 ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let isMuted = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById('mute-icon');
            if (isMuted) {
                icon.setAttribute('data-lucide', 'volume-x');
            } else {
                icon.setAttribute('data-lucide', 'volume-2');
                initAudio();
                playSound('click');
            }
            lucide.createIcons();
        }

        function playSound(type) {
            if (isMuted) return;
            initAudio(); 
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            switch(type) {
                case 'start':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(392.00, now);
                    osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.4);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.2, now + 0.1);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                    break;
                case 'clue':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.15, now + 0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.2);
                    break;
                case 'answer':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.2, now + 0.05);
                    gainNode.gain.setValueAtTime(0.2, now + 0.15);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'triangle';
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.setValueAtTime(659.25, now + 0.2);
                    gain2.gain.setValueAtTime(0, now + 0.2);
                    gain2.gain.linearRampToValueAtTime(0.25, now + 0.25);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                    osc.start(now); osc.stop(now + 0.2);
                    osc2.start(now + 0.2); osc2.stop(now + 1.2);
                    break;
                case 'click':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.1, now + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.06);
                    break;
            }
        }

        // ========== 遊戲邏輯與渲染 ==========
        function renderGame() {
            const q = activeQuestions[currentQ];
            const currentClues = q.clues;

            document.getElementById('question-title').textContent = `第 ${currentQ + 1} 題`;
            document.getElementById('progress-text').textContent = `${currentQ + 1} / ${activeQuestions.length}`;
            document.getElementById('revealed-count').textContent = revealedIndexes.length;

            const cluesHtml = currentClues.map((clue, idx) => {
                const isRevealed = revealedIndexes.includes(idx);
                // 修正點：手機版內距調小，避免擠壓
                const baseClasses = "w-full h-full rounded-xl sm:rounded-3xl flex items-center justify-center p-2 sm:p-6 transition-all duration-200 cursor-pointer text-center";
                
                const stateClasses = isRevealed
                    ? "bg-white border-2 sm:border-[6px] border-indigo-500 shadow-[2px_2px_0px_rgba(79,70,229,1)] sm:shadow-[4px_4px_0px_rgba(79,70,229,1)] translate-x-[-1px] translate-y-[-1px]"
                    : "bg-slate-200 border-2 sm:border-[6px] border-dashed border-slate-400 hover:bg-slate-300 active:bg-slate-400";
                
                // 修正點：手機版字體使用 text-lg，確保長句子絕對塞得下
                const content = isRevealed
                    ? `<span class="text-lg sm:text-4xl lg:text-5xl font-black text-slate-900 leading-tight sm:leading-snug tracking-wide pointer-events-none">${clue}</span>`
                    : `<span class="text-[3rem] sm:text-[8rem] font-black text-slate-400 opacity-60 pointer-events-none leading-none">?</span>`;

                return `<div onclick="revealSpecificClue(${idx})" class="${baseClasses} ${stateClasses}">${content}</div>`;
            }).join('');
            
            document.getElementById('clues-grid').innerHTML = cluesHtml;

            const ansContainer = document.getElementById('answer-container');
            const ansTextEl = document.getElementById('answer-text');

            if (isShowAns) {
                ansTextEl.textContent = q.answer;
                
                ansContainer.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                ansContainer.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
            } else {
                ansContainer.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
                ansContainer.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
                setTimeout(() => { if(!isShowAns) ansTextEl.textContent = ''; }, 300);
            }

            document.getElementById('btn-prev').disabled = currentQ === 0;
            document.getElementById('btn-next').disabled = currentQ === activeQuestions.length - 1;
            document.getElementById('btn-open-clue').disabled = revealedIndexes.length >= 6 || isShowAns;
            document.getElementById('btn-show-ans').disabled = isShowAns;
        }

        // ========== 互動操作 ==========
        function nextClue() {
            if (isShowAns || revealedIndexes.length >= 6) return;
            const q = activeQuestions[currentQ];
            const currentClues = q.clues;
            
            let openedIdx = -1;
            for (let i = 0; i < 6; i++) {
                if (!revealedIndexes.includes(i)) {
                    revealedIndexes.push(i);
                    openedIdx = i;
                    break;
                }
            }
            if(openedIdx !== -1) {
                playSound('clue');
                renderGame();
                openClueModal(currentClues[openedIdx], openedIdx);
            }
        }

        function revealSpecificClue(idx) {
            const q = activeQuestions[currentQ];
            const currentClues = q.clues;

            if (!isShowAns) {
                if (!revealedIndexes.includes(idx)) {
                    revealedIndexes.push(idx);
                    playSound('clue');
                    renderGame();
                    openClueModal(currentClues[idx], idx);
                } else {
                    playSound('click');
                    openClueModal(currentClues[idx], idx);
                }
            }
        }

        function showAnswer() {
            if (!isShowAns) {
                isShowAns = true;
                playSound('answer');
                renderGame();
            }
        }

        function changeQuestion(dir) {
            let newQ = currentQ + dir;
            if (newQ >= 0 && newQ < activeQuestions.length) {
                currentQ = newQ;
                revealedIndexes = [];
                isShowAns = false;
                
                localStorage.setItem(PROGRESS_KEY_PREFIX + currentCityKey, currentQ);
                
                playSound('click');
                renderGame();
            }
        }

        // ========== 圖片輪播系統 ==========
        async function openImageSlider() {
            playSound('click');
            const keyword = activeQuestions[currentQ].answer;
            const modal = document.getElementById('image-slider-modal');
            const title = document.getElementById('image-slider-title');
            const loading = document.getElementById('image-loading');
            const imgEl = document.getElementById('slider-image');
            const errorEl = document.getElementById('image-error');
            const prevBtn = document.getElementById('slider-prev-btn');
            const nextBtn = document.getElementById('slider-next-btn');
            const counter = document.getElementById('slider-counter');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            title.textContent = keyword;
            
            imgEl.classList.add('hidden');
            errorEl.classList.add('hidden');
            prevBtn.classList.add('hidden');
            nextBtn.classList.add('hidden');
            counter.textContent = '- / -';
            loading.classList.remove('hidden');
            loading.classList.add('flex');

            imagesData = [];
            currentImgIdx = 0;

            try {
                const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(keyword)}&gsrnamespace=6&gsrlimit=10&prop=imageinfo&iiprop=url&format=json&origin=*`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.query && data.query.pages) {
                    const pages = data.query.pages;
                    for (let id in pages) {
                        const info = pages[id].imageinfo;
                        if (info && info[0] && info[0].url) {
                            const imgUrl = info[0].url;
                            if (imgUrl.match(/\.(jpeg|jpg|png|webp)$/i) && !imgUrl.includes('Ambox') && !imgUrl.includes('Commons-logo')) {
                                imagesData.push(imgUrl);
                            }
                        }
                    }
                }
            } catch (err) {
                console.error("圖片載入失敗", err);
            }

            loading.classList.remove('flex');
            loading.classList.add('hidden');

            if (imagesData.length > 0) {
                updateSliderView();
            } else {
                errorEl.classList.remove('hidden');
                errorEl.classList.add('flex');
            }
            
            lucide.createIcons();
        }

        function closeImageSlider() {
            playSound('click');
            const modal = document.getElementById('image-slider-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('slider-image').src = ""; 
        }

        function updateSliderView() {
            const imgEl = document.getElementById('slider-image');
            const prevBtn = document.getElementById('slider-prev-btn');
            const nextBtn = document.getElementById('slider-next-btn');
            const counter = document.getElementById('slider-counter');

            imgEl.src = imagesData[currentImgIdx];
            imgEl.classList.remove('hidden');

            counter.textContent = `${currentImgIdx + 1} / ${imagesData.length}`;

            if (imagesData.length > 1) {
                prevBtn.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
            } else {
                prevBtn.classList.add('hidden');
                nextBtn.classList.add('hidden');
            }
        }

        function nextImage(e) {
            if(e) e.stopPropagation();
            if (imagesData.length <= 1) return;
            playSound('click');
            currentImgIdx = (currentImgIdx + 1) % imagesData.length;
            updateSliderView();
        }

        function prevImage(e) {
            if(e) e.stopPropagation();
            if (imagesData.length <= 1) return;
            playSound('click');
            currentImgIdx = (currentImgIdx - 1 + imagesData.length) % imagesData.length;
            updateSliderView();
        }

        const sliderContent = document.getElementById('image-slider-content');
        sliderContent.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        sliderContent.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            if (imagesData.length <= 1) return;
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) {
                nextImage();
            }
            if (touchEndX > touchStartX + threshold) {
                prevImage();
            }
        }
    </script>
</body>
</html>
